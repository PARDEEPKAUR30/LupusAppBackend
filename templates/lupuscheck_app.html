{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lupus Prediction</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery-->
     <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>


    <style>
      
        .card {
            background: url("{% static 'images/lupus_app_icon.png' %}") no-repeat center center fixed;
            background-size: cover;
            border-radius: 15px;
            width:100%;
            margin: auto;
        }
        /* Tablet and above */
        @media (min-width: 768px) {
            .card {
                width: 60%;
            }
        }

        /* Desktop */
        @media (min-width: 992px) {
            .card {
                width: 40%;
            }
        }
        #main{
            background:#fff;
            opacity: 0.85;
            border-radius: 15px;
            border: 1px solid #ccc;
        }

        #lupusForm { 
            height: 100vh;              
            overflow-y: auto; 
            scrollbar-width: none;     /* Firefox */
            -ms-overflow-style: none;  /* IE */
        }
         #lupusForm::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }
        .title{
            font-size: 30;
            font-weight: "bold";
            color: #9a33cc;
            flex-shrink: 1, 
        }
        .submit-button,.submit-button:hover, .submit-button:active,.submit-button:focus{
            background-color:#9a33cc!important;
            color:#fff;
            border-radius: 5;
            align-self: "center"; 
            font-weight:bold;
            border-color:#9a33cc;
        }
        .form-check-input[type=radio]{
            border-width: 2px;
            border-radius: 50%;
            border-color: #000;
        }
        .form-check-input:checked {
            background-color: #9a33cc;
        }

        /* loader CSS*/

        /* Full screen overlay */
        #loaderOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Butterfly-style loader (rotating wings effect) */
        .butterfly-loader {
            width: 60px;
            height: 60px;
            border: 6px solid transparent;
            border-top: 6px solid #9a33cc;
            border-bottom: 6px solid #9a33cc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* reset button css*/
        .header-container {
            position: relative;
        }

        .reset-circle {
            width: 24px;         
            height: 24px;       
            border-radius: 50%;
            border: 2px solid #9a33cc;  
            background: transparent;
            color: #9a33cc;
            font-size: 14px; 
            font-weight: bold;     
            padding: 0;           
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .reset-circle:hover {
            background: #9a33cc;
            color: #fff;
        }
    
    </style>
</head>

<body>
    <div class="container mt-5 mb-5">
        <div class="card shadow p-0">
            
            <div id="main" class="p-4">
                <div class="header-container mb-3">
                    <h2 class="text-center title fw-bold">
                        <img src="{% static 'images/lupus_app_logo.png' %}" height="100" width="80">
                        Check For Lupus
                    </h2>

                    <!-- <div class="d-flex">
                        <button type="button" id="resetBtn" class="btn reset-circle">
                            ⟳
                        </button>
                    </div> -->
                </div>
            

                <form id="lupusForm" class="p-1">
                    {% csrf_token %}
                    <div>
                        <div class="entery_criteria">
                            <div class="mb-3">
                                <label class="form-label"><b>ANA Test</b></label><br>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="ana" value="Positive">
                                    <label class="form-check-label">Positive</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input selected" type="radio" name="ana" value="Negative" checked>
                                    <label class="form-check-label">Negative</label>
                                </div>
                            </div>
                        </div>
                        <div class="criteria_parameters" style="display:none;">
                            <!-- YES / NO RADIO TEMPLATE -->
                            {% for field, label in fields %}
                            <div class="mb-3">
                                <label class="form-label"><b>{{ label }}</b></label><br>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="{{ field }}" value="Yes">
                                    <label class="form-check-label">Yes</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input selected" type="radio" name="{{ field }}" value="No" checked>
                                    <label class="form-check-label">No</label>
                                </div>
                            </div>
                            {% endfor %}

                            <!-- NUMERIC FIELDS -->
                            <div class="mb-3">
                                <label class="form-label"><b>Urine Protein or Proteinuria (g/24h)</b></label>
                                <input type="number" step="any" class="form-control" name="urineRoutine" min="0.0">
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><b>Total Leukocyte Count or TLC (/mcL)</b></label>
                                <input type="number" step="any" class="form-control" name="tlc" min="0">
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><b>Platelet Count (Lacs/cmm)</b></label>
                                <input type="number" step="any" class="form-control" name="plateletCount" min="0.0">
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><b>C3 (mg/dL)</b></label>
                                <input type="number" step="any" class="form-control" name="c3" min="0.0">
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><b>C4 (mg/dL)</b></label>
                                <input type="number" step="any" class="form-control" name="c4" min="0.0">
                            </div>
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary w-40 submit-button">See Result</button>
                            </div>
                        </div>
                        
                    </div>
                    
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap Modal -->
    <div class="modal fade" id="resultModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Result</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="modalBody">
                <!-- Dynamic content goes here -->
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                Close
                </button>
            </div>

            </div>
        </div>
    </div>

    <!-- Loader-->
    <div id="loaderOverlay">
        <div class="butterfly-loader"></div>
    </div>

    <script>

        $(document).ready(function () {
            function toggleCriteria() {
                const selected = $('input[name="ana"]:checked').val();

                if (selected === "Positive") {
                    // $('.criteria_parameters').show();
                    $('.criteria_parameters').stop(true, true).slideDown();
                } else {
                    // $('.criteria_parameters').hide();
                    $('.criteria_parameters').stop(true, true).slideUp();
                    $("#lupusForm")[0].reset();
                    // Clear numeric fields explicitly
                    $('input[type="number"]').val('');
                }
            }

            // Run on page load
            toggleCriteria();

            // Listen for change
            $('input[name="ana"]').on('change', function () {
                toggleCriteria();
            });

        });

        document.getElementById("lupusForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            // show loader
            document.getElementById("loaderOverlay").style.display = "flex";

            const formData = new FormData(this);

            const modal = new bootstrap.Modal(document.getElementById('resultModal'));
            const modalTitle = document.getElementById("modalTitle");
            const modalBody = document.getElementById("modalBody");

            try {
                const response = await fetch("{% url 'predict_lupus' %}", {
                    method: "POST",
                    body: formData,
                    headers: {
                        "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value
                    }
                });

                let result;
                try {
                    result = await response.json();
                } catch {
                    throw new Error("Invalid JSON response from server");
                }

                console.log("Backend Response:", result);

                // ✅ CHECK ACTUAL RESULT CONTENT
                if (response.ok && result.prediction !== "Something went wrong. Please try again!") {
                    
                    const flagIcon = result.weightage >= 20 &&  result.clinical_criterion=="Yes"
                        ? ' <span style="color:red;">🚩 High Risk</span>' 
                        : '';

                    modalTitle.innerText = "Prediction Results";
                    modalBody.innerHTML = `
                        <b>Status:</b> ${result.prediction}<br><br>
                        <b>Score:</b> ${result.weightage} ${flagIcon}<br><br>
                        <small>
                            Important Note: All the results of this app are for educational purposes only. The app results should not be used for Lupus classification and are not intended to replace clinical judgment or guide individual patient care in any manner.
                        </small>
                    `;

                } else {
                    modalTitle.innerText = "Error";
                    modalBody.innerHTML = result.prediction || result.message || "Something went wrong. Please try again!";
                }

            } catch (error) {
                document.getElementById("loaderOverlay").style.display = "none";
                console.error("Fetch error:", error);

                modalTitle.innerText = "Network Error";
                modalBody.innerHTML = "Unable to connect to the server. Please check your internet.";
            }

            document.getElementById("loaderOverlay").style.display = "none";
            modal.show();
        });


        // reset button
        $(document).ready(function () {
            $("#resetBtn").on("click", function () {
                $("#lupusForm")[0].reset();

                // Hide criteria section
                $(".criteria_parameters").slideUp();

                // Set ANA back to Negative
                // $('input[name="ana"][value="Negative"]').prop("checked", true);

                // Clear numeric fields explicitly
                $('input[type="number"]').val('');
            });
        });
    </script>

</body>
</html>
