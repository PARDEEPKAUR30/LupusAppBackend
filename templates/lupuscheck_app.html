{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lupus Prediction</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <style>
      
        .card {
            background: url("{% static 'images/lupus_app_icon.png' %}") no-repeat center center fixed;
            background-size: cover;
            border-radius: 15px;
            width:100%;
            margin: auto;
        }
        /* Tablet and above */
        @media (min-width: 768px) {
            .card {
                width: 60%;
            }
        }

        /* Desktop */
        @media (min-width: 992px) {
            .card {
                width: 40%;
            }
        }
        #lupusForm {
            background:#fff;
            opacity: 0.85;
             border-radius: 15px;
         }
        .title{
            font-size: 30;
            font-weight: "bold";
            color: #9a33cc;
            flex-shrink: 1, 
        }
        .submit-button,.submit-button:hover, .submit-button:active,.submit-button:focus{
            background-color:#9a33cc!important;
            color:#fff;
            border-radius: 5;
            align-self: "center"; 
            font-weight:bold;
            border-color:#9a33cc;
        }
        .form-check-input[type=radio]{
            border-width: 2px;
            border-radius: 50%;
            border-color: #000;
        }
        .form-check-input:checked {
            background-color: #9a33cc;
        }
    
    </style>
</head>

<body>
    <div class="container mt-5 mb-5">
        <div class="card shadow p-0">
            
            <form id="lupusForm" class="p-4">
                {% csrf_token %}
                <div>
                    <h2 class="text-center mb-4 title fw-bold"><img src="{% static 'images/lupus_app_logo.png' %}" height="100" width="80">Check For Lupus</h2>


                    <!-- YES / NO RADIO TEMPLATE -->
                    {% for field, label in fields %}
                    <div class="mb-3">
                        <label class="form-label"><b>{{ label }}</b></label><br>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="{{ field }}" value="Yes">
                            <label class="form-check-label">Yes</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input selected" type="radio" name="{{ field }}" value="No" checked>
                            <label class="form-check-label">No</label>
                        </div>
                    </div>
                    {% endfor %}

                    <!-- NUMERIC FIELDS -->
                    <div class="mb-3">
                        <label class="form-label"><b>Urine Protein or Proteinuria (g/24h)</b></label>
                        <input type="number" step="any" class="form-control" name="urineRoutine">
                    </div>

                    <div class="mb-3">
                        <label class="form-label"><b>Total Leukocyte Count or TLC (/cumm)</b></label>
                        <input type="number" step="any" class="form-control" name="tlc">
                    </div>

                    <div class="mb-3">
                        <label class="form-label"><b>Platelet Count (Lacs/cmm)</b></label>
                        <input type="number" step="any" class="form-control" name="plateletCount">
                    </div>

                    <div class="mb-3">
                        <label class="form-label"><b>C3 (mg/dL)</b></label>
                        <input type="number" step="any" class="form-control" name="c3">
                    </div>

                    <div class="mb-3">
                        <label class="form-label"><b>C4 (mg/dL)</b></label>
                        <input type="number" step="any" class="form-control" name="c4">
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary w-40 submit-button">See Result</button>
                    </div>
                    
                </div>
                
            </form>
        </div>
    </div>

    <!-- Bootstrap Modal -->
    <div class="modal fade" id="resultModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Result</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="modalBody">
                <!-- Dynamic content goes here -->
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                Close
                </button>
            </div>

            </div>
        </div>
    </div>

    <script>
        document.getElementById("lupusForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const formData = new FormData(this);

            const modal = new bootstrap.Modal(document.getElementById('resultModal'));
            const modalTitle = document.getElementById("modalTitle");
            const modalBody = document.getElementById("modalBody");

            try {
                const response = await fetch("{% url 'predict_lupus' %}", {
                    method: "POST",
                    body: formData,
                    headers: {
                        "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value
                    }
                });

                let result;
                try {
                    result = await response.json();
                } catch {
                    throw new Error("Invalid JSON response from server");
                }

                console.log("Backend Response:", result);

                // ✅ CHECK ACTUAL RESULT CONTENT
                if (response.ok && result.prediction !== "Something went wrong. Please try again!") {

                    modalTitle.innerText = "Prediction Result";
                    modalBody.innerHTML = `
                        <b>Result:</b> ${result.prediction}<br><br>
                        <small>
                            Important Note: All the results of this app are for educational purposes only. The app results should not be used for Lupus classification and are not intended to replace clinical judgment or guide individual patient care in any manner.
                        </small>
                    `;

                } else {
                    modalTitle.innerText = "Error";
                    modalBody.innerHTML = result.prediction || result.message || "Something went wrong. Please try again!";
                }

            } catch (error) {
                console.error("Fetch error:", error);

                modalTitle.innerText = "Network Error";
                modalBody.innerHTML = "Unable to connect to the server. Please check your internet.";
            }

            modal.show();
        });
        </script>

</body>
</html>
