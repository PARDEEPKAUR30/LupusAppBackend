{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lupus Prediction</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</head>

<body>
    <div class="container mt-5 mb-5 text-center">
        <p class="mb-3" style="font-size: 18px;">
            Click to open App 
            <span style="font-size: 22px;" class="hand">👉</span>
            <a href="/api/lupuscheck_app/" class="app-btn">
                <img src="{% static 'images/appstore.png' %}" alt="App Store" width="80">
            </a>
        </p>
    </div>

    <style>
        .app-btn img {
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            margin-left: 10px;
        }

        .app-btn img:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Animated hand */
        .hand {
            font-size: 28px;
            position: relative;
            display: inline-block;
            animation: pointRight 1s infinite;
            margin-bottom: 10px;
        }

        /* Animation */
        @keyframes pointRight {
            0% { transform: translateX(0); }
            50% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }
        </style>
</body>
</html>
